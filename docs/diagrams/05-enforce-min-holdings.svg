iv></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g transform="translate(213.673828125, 36.5)" data-id="W" data-node="true" id="flowchart-W-0" class="node default input flowchart-label"><rect height="52" width="187.78125" y="-26" x="-93.890625" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-86.390625, -18.5)" style="" class="label"><rect/><foreignObject height="37" width="172.78125"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">raw_weights<br />from ef.clean_weights()</span></div></foreignObject></g></g><g transform="translate(213.673828125, 149.25)" data-id="THRESH" data-node="true" id="flowchart-THRESH-2" class="node default decide flowchart-label"><rect height="52.5" width="307.6484375" y="-26.25" x="-153.82421875" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-146.32421875, -18.75)" style="" class="label"><rect/><foreignObject height="37.5" width="292.6484375"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">keep = weights  ≥  prune_below_pct / 100<br />e.g. 0.25 %  →  threshold = 0.0025</span></div></foreignObject></g></g><g transform="translate(213.673828125, 342.765625)" data-id="ENOUGH" data-node="true" id="flowchart-ENOUGH-4" class="node default decide flowchart-label"><polygon style="" transform="translate(-117.265625,117.265625)" class="label-container" points="117.265625,0 234.53125,-117.265625 117.265625,-234.53125 0,-117.265625"/><g transform="translate(-93.015625, -9.25)" style="" class="label"><rect/><foreignObject height="18.5" width="186.03125"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">len(keep) ≥ min_holdings?</span></div></foreignObject></g></g><g transform="translate(98.921875, 582.28125)" data-id="NORM1" data-node="true" id="flowchart-NORM1-6" class="node default output flowchart-label"><rect height="54.5" width="197.84375" y="-27.25" x="-98.921875" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-91.421875, -19.75)" style="" class="label"><rect/><foreignObject height="39.5" width="182.84375"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">return keep / keep.sum()<br />✅ renormalised to 1.0</span></div></foreignObject></g></g><g transform="translate(328.42578125, 582.28125)" data-id="TOP" data-node="true" id="flowchart-TOP-8" class="node default default flowchart-label"><rect height="70.5" width="161.1640625" y="-35.25" x="-80.58203125" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-73.08203125, -27.75)" style="" class="label"><rect/><foreignObject height="55.5" width="146.1640625"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">top_n = weights<br />  .sort_values(desc)<br />  .head(min_holdings)</span></div></foreignObject></g></g><g transform="translate(328.42578125, 704.03125)" data-id="NORM2" data-node="true" id="flowchart-NORM2-10" class="node default output flowchart-label"><rect height="73" width="249.5078125" y="-36.5" x="-124.75390625" ry="0" rx="0" style="" class="basic label-container"/><g transform="translate(-117.25390625, -29)" style="" class="label"><rect/><foreignObject height="58" width="234.5078125"><div style="display: inline-block; white-space: nowrap;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel">return top_n / top_n.sum()<br />✅ guarantees minimum holdings<br />even if below threshold</span></div></foreignObject></g></g><g transform="translate